services:
  # Backend API & ML Service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
    environment:
      - PYTHONPATH=/app:/app/backend
    restart: unless-stopped

  # React Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Use container dependencies
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/home/node/n8n-workflows:ro
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_RUNNERS_ENABLED=false
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  n8n_data:
